<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JanMitra - Citizen Safety App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a237e 0%,#283593 50%,#1565c0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.container{text-align:center;padding:2rem;max-width:480px}
.logo{width:120px;height:120px;background:rgba(255,255,255,0.15);border-radius:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.2)}
.logo svg{width:60px;height:60px;fill:#fff}
h1{font-size:2.5rem;font-weight:700;margin-bottom:0.5rem;letter-spacing:-0.5px}
.subtitle{font-size:1.1rem;opacity:0.85;margin-bottom:2.5rem;line-height:1.6}
.buttons{display:flex;flex-direction:column;gap:14px;align-items:center}
.btn{display:inline-block;background:#fff;color:#1a237e;padding:16px 48px;border-radius:50px;text-decoration:none;font-weight:700;font-size:1.1rem;transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.2);width:280px;text-align:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.btn-outline{background:transparent;border:2px solid rgba(255,255,255,0.8);color:#fff}
.btn-outline:hover{background:rgba(255,255,255,0.15)}
.btn-label{display:block;font-size:0.75rem;font-weight:400;opacity:0.7;margin-top:4px}
.badge{display:inline-block;background:rgba(255,255,255,0.15);padding:6px 16px;border-radius:20px;font-size:0.85rem;margin-bottom:1.5rem;backdrop-filter:blur(5px)}
.footer{margin-top:3rem;font-size:0.8rem;opacity:0.6}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
</div>
<div class="badge">Ahmedabad Police</div>
<h1>JanMitra</h1>
<p class="subtitle">Your direct line to Ahmedabad Police.<br>Report incidents quickly and safely.</p>
<div class="buttons">
<a href="/download" class="btn">Download Android App</a>
<a href="/webapp/" class="btn btn-outline">Open Web App<span class="btn-label">Works on iPhone, iPad &amp; Desktop</span></a>
</div>
<div class="footer">
<p>Version 1.0.0</p>
<p style="margin-top:4px">&copy; 2025 JanMitra &mdash; Ahmedabad Police</p>
</div>
</div>
</body>
</html>
